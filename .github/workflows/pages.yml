name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: pip install pyyaml markdown-it-py jsonschema

      - name: Build Zettelkasten notes
        run: python3 scripts/build_notes.py

      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp notes.html _site/
          cp graph.html _site/
          cp -r apps _site/
          if [ -d notes ]; then cp -r notes _site/; fi
          # sources/ is intentionally not shipped to Pages.

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
