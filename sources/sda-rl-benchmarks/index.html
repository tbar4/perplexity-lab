<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SDA RL Benchmarks · Live Comparison Dashboard</title>
<meta name="description" content="Interactive comparison of reinforcement learning benchmarks for Space Domain Awareness: narrow-FOV SSA, OrbitZoo, NORAD TLE, Starlink validation, and more." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'monospace'],
        },
        colors: {
          ink: { 950: '#05070a', 900: '#0a0e14', 800: '#10151c', 700: '#1a2230', 600: '#2a3548', 500: '#475569' },
          accent: { 400: '#7dd3fc', 500: '#38bdf8', 600: '#0ea5e9', 700: '#0369a1' },
          plasma: { 400: '#c084fc', 500: '#a855f7' },
          signal: { 400: '#4ade80', 500: '#22c55e', amber: '#fbbf24', red: '#f87171' }
        }
      }
    }
  }
</script>
<style>
  body { background: radial-gradient(ellipse at top, #0a0e14 0%, #05070a 100%); color: #e2e8f0; font-family: 'Inter', sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0a0e14; }
  ::-webkit-scrollbar-thumb { background: #2a3548; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #475569; }
  .grain::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; opacity: 0.025; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  .star-field {
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 60% 70%, rgba(125,211,252,0.5), transparent),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3), transparent),
      radial-gradient(2px 2px at 40% 80%, rgba(168,85,247,0.4), transparent),
      radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,0.5), transparent);
  }
  .glow-accent { box-shadow: 0 0 24px -8px rgba(56, 189, 248, 0.4); }
  .text-balance { text-wrap: balance; }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 9999px;
    font-size: 11px; font-weight: 500;
    border: 1px solid rgba(148, 163, 184, 0.2);
    background: rgba(26, 34, 48, 0.6);
    white-space: nowrap;
  }
  .chip-open { color: #4ade80; border-color: rgba(74, 222, 128, 0.3); background: rgba(74, 222, 128, 0.08); }
  .chip-closed { color: #f87171; border-color: rgba(248, 113, 113, 0.3); background: rgba(248, 113, 113, 0.08); }
  .chip-partial { color: #fbbf24; border-color: rgba(251, 191, 36, 0.3); background: rgba(251, 191, 36, 0.08); }
  .chip-hybrid { color: #c084fc; border-color: rgba(192, 132, 252, 0.3); background: rgba(192, 132, 252, 0.08); }
  .chip-sim { color: #7dd3fc; border-color: rgba(125, 211, 252, 0.3); background: rgba(125, 211, 252, 0.08); }
  .filter-btn {
    padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500;
    border: 1px solid rgba(148, 163, 184, 0.15);
    background: rgba(16, 21, 28, 0.6);
    color: #94a3b8;
    transition: all 0.15s ease;
    cursor: pointer;
    white-space: nowrap;
  }
  .filter-btn:hover { color: #e2e8f0; border-color: rgba(148, 163, 184, 0.4); }
  .filter-btn.active {
    background: rgba(56, 189, 248, 0.12);
    border-color: rgba(56, 189, 248, 0.5);
    color: #7dd3fc;
  }
  .table-row { transition: background 0.15s ease; }
  .table-row:hover { background: rgba(26, 34, 48, 0.4); }
  .table-row.selected { background: rgba(56, 189, 248, 0.06); border-left: 2px solid #38bdf8; }
  .sortable:hover { color: #7dd3fc; cursor: pointer; }
  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body class="grain min-h-screen antialiased">
<div id="root"></div>

<script type="text/babel" data-type="module" src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect } = React;

// ===== Data =====
const DATA_URL = './benchmarks.json';

// ===== Helper: normalize modality into broad groups =====
function modalityGroup(m) {
  if (!m) return 'Unknown';
  if (m.startsWith('N/A')) return 'State-only';
  if (m.toLowerCase().includes('optical')) return 'Optical';
  if (m.toLowerCase().includes('radar')) return 'Radar';
  return 'Other';
}

function codeChip(c) {
  if (c === 'Open') return <span className="chip chip-open">● Open</span>;
  if (c === 'Open (archived)') return <span className="chip chip-partial">◐ Archived</span>;
  if (c === 'Stated available') return <span className="chip chip-partial">◐ Stated</span>;
  return <span className="chip chip-closed">○ Closed</span>;
}

function realSimChip(r) {
  if (r === 'Hybrid') return <span className="chip chip-hybrid">⬢ Hybrid</span>;
  return <span className="chip chip-sim">◇ Simulated</span>;
}

function bucketLabel(b) {
  if (b === '<100') return '< 100 RSOs';
  if (b === '100-1k') return '100 – 1k RSOs';
  if (b === '1k+') return '1k+ RSOs';
  return b;
}

// ===== Filter Pill Group =====
function FilterGroup({ label, options, selected, onChange, formatter }) {
  const fmt = formatter || ((x) => x);
  return (
    <div className="space-y-2">
      <div className="text-[10px] uppercase tracking-[0.12em] text-slate-500 font-semibold">{label}</div>
      <div className="flex flex-wrap gap-1.5">
        {options.map(opt => {
          const active = selected.includes(opt);
          return (
            <button
              key={opt}
              className={`filter-btn ${active ? 'active' : ''}`}
              onClick={() => onChange(active ? selected.filter(s => s !== opt) : [...selected, opt])}
            >
              {fmt(opt)}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ===== Detail Card =====
function DetailCard({ b, onClose }) {
  return (
    <div className="fade-in bg-ink-800/70 border border-slate-700/50 rounded-xl p-5 backdrop-blur-sm relative">
      <button onClick={onClose} className="absolute top-3 right-3 text-slate-500 hover:text-slate-200 text-sm" aria-label="Remove">×</button>
      <div className="space-y-3">
        <div>
          <div className="text-[10px] uppercase tracking-[0.12em] text-accent-500 font-semibold">{b.year} · {b.venue}</div>
          <h3 className="text-lg font-semibold text-slate-100 mt-0.5 text-balance">{b.name}</h3>
          <div className="text-xs text-slate-400 mt-1">{b.fullName}</div>
          <div className="text-xs text-slate-500 mt-1 italic">{b.authors}</div>
        </div>

        <div className="flex flex-wrap gap-1.5">
          {codeChip(b.codeAvailability)}
          {realSimChip(b.realVsSim)}
          <span className="chip">{b.datasetType}</span>
          <span className="chip">{bucketLabel(b.rsoBucket)}</span>
          <span className="chip">{modalityGroup(b.sensorModality)}</span>
        </div>

        <div className="grid grid-cols-2 gap-3 text-xs pt-1">
          <div>
            <div className="text-[10px] uppercase tracking-wide text-slate-500 font-semibold mb-1">RSOs / Satellites</div>
            <div className="text-slate-300">{b.rsoCountLabel}</div>
          </div>
          <div>
            <div className="text-[10px] uppercase tracking-wide text-slate-500 font-semibold mb-1">Sensor</div>
            <div className="text-slate-300">{b.sensorModality}</div>
          </div>
          <div className="col-span-2">
            <div className="text-[10px] uppercase tracking-wide text-slate-500 font-semibold mb-1">RL Task</div>
            <div className="text-slate-300">{b.taskType}</div>
          </div>
          <div className="col-span-2">
            <div className="text-[10px] uppercase tracking-wide text-slate-500 font-semibold mb-1">Action Space</div>
            <div className="text-slate-300 font-mono text-[11px]">{b.actionSpace}</div>
          </div>
          <div className="col-span-2">
            <div className="text-[10px] uppercase tracking-wide text-slate-500 font-semibold mb-1">Observation</div>
            <div className="text-slate-300 text-[11px]">{b.observationSpace}</div>
          </div>
          <div className="col-span-2">
            <div className="text-[10px] uppercase tracking-wide text-slate-500 font-semibold mb-1">Reward</div>
            <div className="text-slate-300 text-[11px] font-mono">{b.reward}</div>
          </div>
        </div>

        <div className="pt-2 border-t border-slate-700/50">
          <div className="text-[10px] uppercase tracking-wide text-signal-500 font-semibold mb-1.5">Strengths</div>
          <ul className="space-y-1">
            {b.strengths.map((s, i) => (
              <li key={i} className="text-xs text-slate-300 flex gap-1.5">
                <span className="text-signal-400 mt-0.5">+</span><span>{s}</span>
              </li>
            ))}
          </ul>
        </div>

        <div>
          <div className="text-[10px] uppercase tracking-wide text-signal-red font-semibold mb-1.5">Limitations</div>
          <ul className="space-y-1">
            {b.limitations.map((s, i) => (
              <li key={i} className="text-xs text-slate-300 flex gap-1.5">
                <span className="text-signal-red mt-0.5">−</span><span>{s}</span>
              </li>
            ))}
          </ul>
        </div>

        <div>
          <div className="text-[10px] uppercase tracking-wide text-plasma-400 font-semibold mb-1.5">Reproducibility</div>
          <div className="text-xs text-slate-300">{b.reproducibility}</div>
        </div>

        <div>
          <div className="text-[10px] uppercase tracking-wide text-slate-500 font-semibold mb-1.5">Algorithms benchmarked</div>
          <div className="flex flex-wrap gap-1">
            {b.algorithms.map((a, i) => (
              <span key={i} className="font-mono text-[10px] bg-ink-700/50 border border-slate-700/40 px-1.5 py-0.5 rounded text-slate-300">{a}</span>
            ))}
          </div>
        </div>

        <div className="flex flex-wrap gap-2 pt-2 border-t border-slate-700/50">
          {b.paperUrl && (
            <a href={b.paperUrl} target="_blank" rel="noopener noreferrer" className="text-xs text-accent-400 hover:text-accent-500 underline-offset-2 hover:underline">
              → Paper
            </a>
          )}
          {b.codeUrl && (
            <a href={b.codeUrl} target="_blank" rel="noopener noreferrer" className="text-xs text-accent-400 hover:text-accent-500 underline-offset-2 hover:underline">
              → Code
            </a>
          )}
        </div>
      </div>
    </div>
  );
}

// ===== Main App =====
function App() {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  // Filters
  const [datasetTypes, setDatasetTypes] = useState([]);
  const [realSim, setRealSim] = useState([]);
  const [buckets, setBuckets] = useState([]);
  const [modalities, setModalities] = useState([]);
  const [codeStates, setCodeStates] = useState([]);
  const [search, setSearch] = useState('');

  // Selection & sort
  const [selectedIds, setSelectedIds] = useState([]);
  const [sortKey, setSortKey] = useState('year');
  const [sortDir, setSortDir] = useState('desc');

  useEffect(() => {
    fetch(DATA_URL)
      .then(r => r.json())
      .then(d => { setData(d); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, []);

  const allDatasetTypes = useMemo(() => [...new Set(data.map(b => b.datasetType))].sort(), [data]);
  const allRealSim = useMemo(() => [...new Set(data.map(b => b.realVsSim))].sort(), [data]);
  const allBuckets = ['<100', '100-1k', '1k+'];
  const allModalities = useMemo(() => [...new Set(data.map(b => modalityGroup(b.sensorModality)))].sort(), [data]);
  const allCodeStates = ['Open', 'Open (archived)', 'Stated available', 'Closed'];

  const filtered = useMemo(() => {
    return data.filter(b => {
      if (datasetTypes.length && !datasetTypes.includes(b.datasetType)) return false;
      if (realSim.length && !realSim.includes(b.realVsSim)) return false;
      if (buckets.length && !buckets.includes(b.rsoBucket)) return false;
      if (modalities.length && !modalities.includes(modalityGroup(b.sensorModality))) return false;
      if (codeStates.length && !codeStates.includes(b.codeAvailability)) return false;
      if (search) {
        const q = search.toLowerCase();
        const hay = `${b.name} ${b.fullName} ${b.authors} ${b.venue} ${b.taskType} ${b.algorithms.join(' ')}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [data, datasetTypes, realSim, buckets, modalities, codeStates, search]);

  const sorted = useMemo(() => {
    const arr = [...filtered];
    arr.sort((a, b) => {
      let va = a[sortKey], vb = b[sortKey];
      if (sortKey === 'rsoCount') { va = a.rsoCount; vb = b.rsoCount; }
      if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
      if (va < vb) return sortDir === 'asc' ? -1 : 1;
      if (va > vb) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return arr;
  }, [filtered, sortKey, sortDir]);

  function toggleSort(k) {
    if (sortKey === k) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
    else { setSortKey(k); setSortDir('desc'); }
  }

  function toggleSelect(id) {
    if (selectedIds.includes(id)) setSelectedIds(selectedIds.filter(x => x !== id));
    else if (selectedIds.length < 3) setSelectedIds([...selectedIds, id]);
    else setSelectedIds([...selectedIds.slice(1), id]);
  }

  function clearFilters() {
    setDatasetTypes([]); setRealSim([]); setBuckets([]); setModalities([]); setCodeStates([]); setSearch('');
  }

  const stats = useMemo(() => {
    return {
      total: data.length,
      shown: filtered.length,
      openCode: filtered.filter(b => b.codeAvailability === 'Open').length,
      hybrid: filtered.filter(b => b.realVsSim === 'Hybrid').length,
      thousandPlus: filtered.filter(b => b.rsoBucket === '1k+').length,
    };
  }, [data, filtered]);

  const SortHeader = ({ k, children, align = 'left' }) => (
    <th className={`text-[10px] uppercase tracking-wider text-slate-400 font-semibold py-3 px-3 sortable text-${align}`} onClick={() => toggleSort(k)}>
      <span className="inline-flex items-center gap-1">
        {children}
        {sortKey === k && <span className="text-accent-500">{sortDir === 'asc' ? '↑' : '↓'}</span>}
      </span>
    </th>
  );

  if (loading) return <div className="min-h-screen flex items-center justify-center text-slate-400">Loading benchmarks…</div>;
  if (error) return <div className="min-h-screen flex items-center justify-center text-signal-red">Error: {error}</div>;

  const selected = selectedIds.map(id => data.find(b => b.id === id)).filter(Boolean);

  return (
    <div className="relative z-10">
      {/* Header */}
      <header className="border-b border-slate-800/60 backdrop-blur-md bg-ink-950/70 sticky top-0 z-20">
        <div className="max-w-[1400px] mx-auto px-6 py-5">
          <div className="flex items-start justify-between gap-6 flex-wrap">
            <div>
              <div className="flex items-center gap-2.5">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" className="text-accent-500">
                  <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="1.2" opacity="0.4"/>
                  <ellipse cx="12" cy="12" rx="10" ry="4" stroke="currentColor" strokeWidth="1.2" opacity="0.7" transform="rotate(-30 12 12)"/>
                  <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                  <circle cx="20" cy="8" r="1" fill="currentColor" opacity="0.6"/>
                </svg>
                <div className="text-[10px] uppercase tracking-[0.2em] text-accent-400 font-semibold">SDA · Reinforcement Learning</div>
              </div>
              <h1 className="text-xl font-bold text-slate-100 mt-1.5 tracking-tight">RL Benchmarks for Space Domain Awareness</h1>
              <p className="text-xs text-slate-400 mt-1 max-w-2xl">
                Comparison of {data.length} reinforcement-learning environments and benchmarks across sensor tasking,
                orbital control, and EOS scheduling. Filter by dataset type, real-vs-simulated, RSO scale, sensor modality, and code openness.
              </p>
            </div>
            <div className="flex gap-4 text-xs">
              <div>
                <div className="text-2xl font-bold text-slate-100 font-mono">{stats.shown}<span className="text-slate-500 text-base">/{stats.total}</span></div>
                <div className="text-[10px] uppercase tracking-wider text-slate-500">Shown</div>
              </div>
              <div>
                <div className="text-2xl font-bold text-signal-400 font-mono">{stats.openCode}</div>
                <div className="text-[10px] uppercase tracking-wider text-slate-500">Open Code</div>
              </div>
              <div>
                <div className="text-2xl font-bold text-plasma-400 font-mono">{stats.hybrid}</div>
                <div className="text-[10px] uppercase tracking-wider text-slate-500">Hybrid Data</div>
              </div>
              <div>
                <div className="text-2xl font-bold text-accent-400 font-mono">{stats.thousandPlus}</div>
                <div className="text-[10px] uppercase tracking-wider text-slate-500">1k+ RSOs</div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main className="max-w-[1400px] mx-auto px-6 py-6 space-y-6">

        {/* Filter Bar */}
        <section className="bg-ink-900/40 border border-slate-800/60 rounded-xl p-5 backdrop-blur-sm">
          <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
            <h2 className="text-xs uppercase tracking-[0.12em] text-slate-300 font-semibold">Filters</h2>
            <div className="flex items-center gap-3 ml-auto">
              <input
                type="text"
                placeholder="Search name, author, task, algorithm…"
                value={search}
                onChange={e => setSearch(e.target.value)}
                className="bg-ink-800/60 border border-slate-700/50 rounded-md px-3 py-1.5 text-xs text-slate-200 placeholder-slate-500 w-full sm:w-72 focus:outline-none focus:border-accent-500/50"
              />
              <button onClick={clearFilters} className="text-[11px] text-slate-400 hover:text-slate-200 underline-offset-2 hover:underline whitespace-nowrap">
                Clear all
              </button>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-5">
            <FilterGroup label="Dataset type" options={allDatasetTypes} selected={datasetTypes} onChange={setDatasetTypes} />
            <FilterGroup label="Real vs simulated" options={allRealSim} selected={realSim} onChange={setRealSim} />
            <FilterGroup label="Number of RSOs" options={allBuckets} selected={buckets} onChange={setBuckets} formatter={bucketLabel} />
            <FilterGroup label="Sensor modality" options={allModalities} selected={modalities} onChange={setModalities} />
            <FilterGroup label="Code availability" options={allCodeStates} selected={codeStates} onChange={setCodeStates} />
          </div>
        </section>

        {/* Layout: Table + Compare Panel */}
        <div className={`grid gap-6 ${selected.length > 0 ? 'lg:grid-cols-[1fr_400px]' : ''}`}>

          {/* Table */}
          <section className="bg-ink-900/40 border border-slate-800/60 rounded-xl backdrop-blur-sm overflow-hidden">
            <div className="flex items-center justify-between px-5 py-3 border-b border-slate-800/60">
              <h2 className="text-xs uppercase tracking-[0.12em] text-slate-300 font-semibold">Benchmarks</h2>
              <div className="text-[10px] text-slate-500">
                {selected.length === 0 ? 'Click rows to compare (max 3)' : `${selected.length}/3 selected`}
              </div>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-ink-900/60 border-b border-slate-800/40">
                  <tr>
                    <SortHeader k="name">Benchmark</SortHeader>
                    <SortHeader k="year">Year</SortHeader>
                    <SortHeader k="datasetType">Dataset</SortHeader>
                    <SortHeader k="realVsSim">Real/Sim</SortHeader>
                    <SortHeader k="rsoCount" align="right">RSOs</SortHeader>
                    <SortHeader k="sensorModality">Sensor</SortHeader>
                    <SortHeader k="codeAvailability">Code</SortHeader>
                    <th className="text-[10px] uppercase tracking-wider text-slate-400 font-semibold py-3 px-3 text-left">Task</th>
                  </tr>
                </thead>
                <tbody>
                  {sorted.length === 0 && (
                    <tr><td colSpan="8" className="py-10 text-center text-slate-500 text-sm">No benchmarks match these filters.</td></tr>
                  )}
                  {sorted.map(b => {
                    const isSelected = selectedIds.includes(b.id);
                    return (
                      <tr
                        key={b.id}
                        className={`table-row border-b border-slate-800/30 last:border-0 cursor-pointer ${isSelected ? 'selected' : ''}`}
                        onClick={() => toggleSelect(b.id)}
                      >
                        <td className="py-3 px-3">
                          <div className="font-semibold text-slate-100 text-[13px]">{b.name}</div>
                          <div className="text-[11px] text-slate-500 mt-0.5">{b.authors}</div>
                        </td>
                        <td className="py-3 px-3 text-slate-300 font-mono text-xs">{b.year}</td>
                        <td className="py-3 px-3 text-slate-300 text-xs">{b.datasetType}</td>
                        <td className="py-3 px-3">{realSimChip(b.realVsSim)}</td>
                        <td className="py-3 px-3 text-right text-slate-300 text-xs font-mono">{b.rsoCountLabel}</td>
                        <td className="py-3 px-3 text-slate-300 text-xs">{modalityGroup(b.sensorModality)}</td>
                        <td className="py-3 px-3">{codeChip(b.codeAvailability)}</td>
                        <td className="py-3 px-3 text-slate-300 text-xs">{b.taskType}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </section>

          {/* Compare Panel */}
          {selected.length > 0 && (
            <aside className="space-y-4">
              <div className="flex items-center justify-between">
                <h2 className="text-xs uppercase tracking-[0.12em] text-slate-300 font-semibold">Compare</h2>
                <button onClick={() => setSelectedIds([])} className="text-[11px] text-slate-400 hover:text-slate-200">Clear</button>
              </div>
              <div className="space-y-4">
                {selected.map(b => (
                  <DetailCard key={b.id} b={b} onClose={() => toggleSelect(b.id)} />
                ))}
              </div>
            </aside>
          )}
        </div>

        {/* Footer */}
        <footer className="pt-6 pb-12 text-[11px] text-slate-500 space-y-2 border-t border-slate-800/40">
          <p>
            Data compiled from arXiv, IEEE Xplore, AMOS conference proceedings, MIT ARCLab, Frontiers in Space Technologies,
            and primary GitHub repositories. Sources include{' '}
            <a href="https://arxiv.org/abs/2504.04160" target="_blank" rel="noopener" className="text-accent-400 hover:underline">OrbitZoo (arXiv:2504.04160)</a>,{' '}
            <a href="https://doi.org/10.3390/s22207847" target="_blank" rel="noopener" className="text-accent-400 hover:underline">Siew & Linares 2022 (Sensors)</a>,{' '}
            <a href="https://amostech.com/TechnicalPapers/2024/Poster/Oakes.pdf" target="_blank" rel="noopener" className="text-accent-400 hover:underline">Oakes AMOS 2024</a>,{' '}
            <a href="https://github.com/mit-ll/spacegym-kspdg" target="_blank" rel="noopener" className="text-accent-400 hover:underline">KSPDG</a>, and{' '}
            <a href="https://github.com/AVSLab/bsk_rl" target="_blank" rel="noopener" className="text-accent-400 hover:underline">BSK-RL</a>.
          </p>
          <p>Coverage 2016–2026. All "real" data refers to TLE/ephemeris from public Space-Track/NORAD/Starlink sources used either for validation (OrbitZoo) or as orbital state inputs (Oakes, SPLID).</p>
        </footer>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
